name: Evals

# The eval harness as CI (eval-harness.md §5-6, §8). The retrieval gate runs on
# every PR (deterministic, zero-tolerance on any hit@5/MRR drop, EVAL-11). The
# full judged suite runs when a PR touches the RAG pipeline (lib/rag/** or
# lib/config.ts - prompts and model flags live there), detected via git diff, no
# marketplace path-filter action needed (EVAL-13). A judged pass-rate drop beyond
# the noise margin M, or below the AC-03 floor, fails the build; a below-threshold
# first run auto-re-runs to 3 and is judged on the median (EVAL-11). On push to
# main only, a separate write-scoped job commits the refreshed artifact so the
# /evals page renders committed reality (EVAL-16, decision 1A).

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

# Least privilege (SEC-17): the gate job only reads; write is scoped to the
# main-push commit job below.
permissions:
  contents: read

# One eval run per ref; cancel superseded PR runs, never a main-push (its commit
# must not be interrupted).
concurrency:
  group: evals-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  eval:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    # env.ts validates all six variables at boot (ENG-06); the eval uses the three
    # real secrets, so Upstash + portfolio get non-secret placeholders.
    env:
      NODE_OPTIONS: --conditions=react-server
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      UPSTASH_REDIS_REST_URL: https://placeholder.upstash.io
      UPSTASH_REDIS_REST_TOKEN: placeholder
      PORTFOLIO_URL: https://placeholder.example.com
    steps:
      # Actions pinned to commit SHAs, not tags (SEC-17).
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0 # full history so the base..head diff resolves

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "20"
          cache: npm

      - name: Install (npm ci)
        run: npm ci

      # EVAL-13 path filter via git diff (no marketplace action). Judged runs when
      # the RAG pipeline changed, or on manual dispatch, or when the base commit is
      # unavailable (fail safe: run the full suite).
      - name: Detect judged scope
        id: scope
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "judged=true" >> "$GITHUB_OUTPUT"; echo "reason: dispatch"; exit 0
          fi
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
            HEAD="${{ github.event.pull_request.head.sha }}"
          else
            BASE="${{ github.event.before }}"
            HEAD="${{ github.sha }}"
          fi
          if ! git rev-parse --quiet --verify "${BASE}^{commit}" >/dev/null 2>&1; then
            echo "judged=true" >> "$GITHUB_OUTPUT"; echo "reason: base unavailable"; exit 0
          fi
          CHANGED="$(git diff --name-only "$BASE" "$HEAD")"
          echo "changed files:"; echo "$CHANGED"
          if echo "$CHANGED" | grep -qE '^(lib/rag/|lib/config\.ts$)'; then
            echo "judged=true" >> "$GITHUB_OUTPUT"; echo "reason: RAG pipeline changed"
          else
            echo "judged=false" >> "$GITHUB_OUTPUT"; echo "reason: no pipeline change"
          fi

      - name: Retrieval gate
        if: steps.scope.outputs.judged != 'true'
        run: npm run eval:ci:retrieval

      - name: Full suite gate (retrieval + judged)
        if: steps.scope.outputs.judged == 'true'
        run: npm run eval:ci:judged -- ${{ github.event_name == 'workflow_dispatch' && '--dispatch' || '' }}

      # Hand the refreshed artifact to the write-scoped commit job (main-push only).
      - name: Upload eval artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: eval-artifact
          path: |
            evals/latest.json
            evals/runs/
          if-no-files-found: error
          retention-days: 7

  # Commit the refreshed artifact back to main so /evals renders committed reality
  # (EVAL-16). Write permission lives ONLY on this main-push job (decision 1A).
  commit:
    needs: eval
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Download eval artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: eval-artifact
          path: eval-artifact

      - name: Commit refreshed artifact ([skip ci])
        run: |
          set -euo pipefail
          mkdir -p evals/runs
          [ -f eval-artifact/latest.json ] && cp -f eval-artifact/latest.json evals/latest.json || true
          [ -d eval-artifact/runs ] && cp -rf eval-artifact/runs/. evals/runs/ || true
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add evals/latest.json evals/runs
          if git diff --cached --quiet; then
            echo "no eval artifact changes to commit"; exit 0
          fi
          git commit -m "chore(evals): update latest.json + run artifact [skip ci]"
          git push
